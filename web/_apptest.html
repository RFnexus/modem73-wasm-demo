<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MODEM73 WASM</title>
</head>
<body>


<fieldset>
  <legend>VOX PTT tone</legend>
  <label><input type="checkbox" id="voxenable"> Enable VOX tones</label>
  <label>Start tone (Hz) <input id="voxleadfreq" type="number" value="1750" min="100" max="3500"></label>
  <label>Start (ms) <input id="voxleadms" type="number" value="200" min="0" max="3000"></label>
  <label>End tone (Hz) <input id="voxtailfreq" type="number" value="1750" min="100" max="3500"></label>
  <label>End (ms) <input id="voxtailms" type="number" value="200" min="0" max="3000"></label>
</fieldset>

<fieldset>
  <legend>Config</legend>
  <label>Family
    <select id="family">
      <option value="ofdm" selected>OFDM</option>
      <option value="mfsk">MFSK</option>
    </select></label>
  <label>Center freq (Hz) <input id="cfreq" type="number" value="1500"></label>

  <span id="ofdm-fields">
    <label>Callsign <input id="callsign" value="WASM" maxlength="9"></label>
    <label>Modulation
      <select id="mod">
        <option>BPSK</option><option selected>QPSK</option><option>8PSK</option>
        <option>QAM16</option><option>QAM64</option><option>QAM256</option>
        <option>QAM1024</option><option>QAM4096</option>
      </select></label>
    <label>Code rate
      <select id="rate">
        <option selected>1/2</option><option>2/3</option><option>3/4</option>
        <option>5/6</option><option>1/4</option>
      </select></label>
    <label>Frame
      <select id="frame">
        <option value="0">short</option>
        <option value="1" selected>normal</option>
        <option value="2">long</option>
      </select></label>
  </span>

  <span id="mfsk-fields" hidden>
    <label>MFSK mode
      <select id="mfsk">
        <option value="2" selected>MFSK-32</option>
        <option value="3">MFSK-32R</option>
      </select></label>
  </span>

  <p><button id="apply">Apply</button> <span id="cfginfo"></span></p>
  <p id="modeinfo"></p>
</fieldset>

<fieldset>
  <legend>Transmit</legend>
  <p>
    <button id="lorem" type="button">Lorem ipsum</button>
    <button id="loremfill" type="button">Fill frame</button>
    <span id="loreminfo"></span>
  </p>
  <p><textarea id="msg" rows="3" cols="60">Hello from MODEM73 over WebAssembly</textarea></p>
  <p><label><input type="checkbox" id="rawpacket"> Send as raw packet</label>
     <small>(unchecked: sent as a chat message that shows up under [ Utilities ] <code>M73:&lt;callsign&gt;:&lt;text&gt;</code>)</small></p>
  <p>
    <button id="loopback">Encode -> decode(loopback)</button>
    <button id="play">Encode &amp; Play</button>
    <button id="export">Export WAV</button>
    <span id="txinfo"></span>
  </p>
</fieldset>

<fieldset>
  <legend>Receive</legend>
  <p><button id="mic">Start microphone</button> <span id="status"></span></p>
  <canvas id="waterfall" width="480" height="140"
          style="display:block;width:480px;height:140px;background:#000;image-rendering:pixelated"></canvas>
  <small id="wflegend">waterfall 0–4000 Hz · red lines mark the 2.4 kHz modem passband</small>
  <p>
    <label>Decode from file
      <input id="file" type="file" accept="audio/wav,audio/x-wav,audio/mpeg,.wav,.mp3">
    </label>
    <span id="fileinfo"></span>
  </p>
</fieldset>

<fieldset>
  <legend>Link stats</legend>
  <div id="stats">no frames decoded yet</div>
  <p><button id="resetstats" type="button">Reset stats</button></p>
</fieldset>

<fieldset>
  <legend>Decoded output</legend>
  <div id="out"></div>
  <p><button id="clear">Clear</button></p>
</fieldset>

<script src="modem73.js"></script>
<script src="app.js"></script>

<div id="apptest">PENDING</div>
<script>
(function(){
  const set=(s)=>{document.getElementById('apptest').textContent=s;};
  let tries=0;
  const iv=setInterval(()=>{
    if (typeof modem==='undefined'||!modem){ if(++tries>400){clearInterval(iv);set('NO MODEM');} return; }
    clearInterval(iv);
    try{
      const R=[];
      const loop=(label,fam,mfskIdx,raw,msg)=>{
        document.getElementById('family').value=fam; syncFamilyUI();
        if(fam==='mfsk') document.getElementById('mfsk').value=String(mfskIdx);
        document.getElementById('rawpacket').checked=raw;
        document.getElementById('msg').value=msg;
        document.getElementById('out').innerHTML='';
        loopback();
        const got=document.getElementById('out').textContent;
        R.push(label+':'+(got.includes(msg)?'ok':'BAD'));
      };
      loop('OFDM-chat','ofdm',0,false,'Hi chat there');
      loop('OFDM-raw','ofdm',0,true,'RawMsg123');
      loop('MFSK32-chat','mfsk',2,false,'MfskHi');
      loop('MFSK32R-raw','mfsk',3,true,'Mfsk32R raw');
      // mfsk dropdown options
      const opts=[...document.getElementById('mfsk').options].map(o=>o.value).join(',');
      R.push('mfskopts='+opts);
      // VOX wrapping length
      document.getElementById('family').value='ofdm'; syncFamilyUI();
      document.getElementById('rawpacket').checked=false;
      document.getElementById('msg').value='vox test';
      document.getElementById('voxenable').checked=false;
      const base=encodeMessage().length;
      document.getElementById('voxenable').checked=true;
      document.getElementById('voxleadms').value='100';
      document.getElementById('voxtailms').value='100';
      const wrapped=applyVox(encodeMessage()).length;
      R.push('vox='+(wrapped===base+9600?'ok':('BAD '+base+'->'+wrapped)));
      set('DONE '+R.join('  '));
    }catch(e){ set('EXC '+e.message+' @@ '+(e.stack||'').split('\n').slice(0,2).join(' | ')); }
  },50);
})();

</body>
</html>
