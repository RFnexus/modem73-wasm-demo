name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:


permissions:
  contents: read
  pages: write
  id-token: write


concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout modem73-wasm
        uses: actions/checkout@v5

      - name: Checkout modem73 (aicodix headers)
        uses: actions/checkout@v5
        with:
          repository: RFnexus/modem73
          ref: dev
          path: modem73

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.64
          actions-cache-folder: emsdk-cache

      - name: Build WASM
        run: |
          MODEM73_DIR="$GITHUB_WORKSPACE/modem73" ./build.sh

      - name: Disable Jekyll
        run: touch web/.nojekyll
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
